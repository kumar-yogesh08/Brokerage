name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Brokerage.exe
            pyinstaller_args: --noconsole --onefile --icon=brokerage_icon.ico --collect-all customtkinter Brokerage.py
          - os: macos-latest
            artifact_name: Brokerage
            pyinstaller_args: --noconsole --onefile --collect-all customtkinter Brokerage.py

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}